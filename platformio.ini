; platformio.ini - PlatformIO Build Configuration
; =================================================
; This file is used if you prefer PlatformIO over the Arduino IDE.
; PlatformIO is a plugin for VS Code and is recommended for more advanced use.
;
; To use PlatformIO:
; 1. Install VS Code from https://code.visualstudio.com
; 2. Install the PlatformIO extension from the VS Code marketplace
; 3. Open this project folder in VS Code
; 4. Click the PlatformIO icon on the left sidebar
; 5. Click "Build" to compile, or "Upload" to flash to the ESP32

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor baud rate - must match Serial.begin() in main.cpp
monitor_speed = 115200

; Upload speed - reduce to 115200 if you get upload errors
upload_speed = 921600

; Required libraries
; PlatformIO will download these automatically
lib_deps =
    tmrh20/RF24 @ ^1.4.8
    tmrh20/RF24Network @ ^1.0.15
    ; ESP32 BLE is included in the ESP32 Arduino framework
    ; No separate install needed

; Extra build flags
; -DCORE_DEBUG_LEVEL=3 enables verbose ESP32 debug output (useful for troubleshooting)
; Remove or comment out the line below for normal use
; build_flags = -DCORE_DEBUG_LEVEL=3

; Board options
board_build.flash_mode = dio
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_size = 4MB
board_build.partitions = default.csv
